name: Release On Tag

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-admin/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run backend tests
        run: pytest

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web-admin

      - name: Type check frontend
        run: npx tsc -b
        working-directory: web-admin

      - name: Build frontend
        run: npm run build
        working-directory: web-admin

  release_init:
    name: Init Release
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release exists
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

  source_bundle:
    name: Build Source Bundle
    needs:
      - verify
      - release_init
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-admin/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web-admin

      - name: Build frontend
        run: npm run build
        working-directory: web-admin

      - name: Build source deploy bundle
        run: |
          set -euo pipefail
          rm -rf release-src
          mkdir -p release-src/web-admin
          cp -R src release-src/src
          cp -R web-admin/dist release-src/web-admin/dist
          cp -R docs release-src/docs
          cp README.md release-src/README.md
          cp .env.example release-src/.env.example
          cp pyproject.toml release-src/pyproject.toml
          if [ -f DEVELOPMENT.md ]; then cp DEVELOPMENT.md release-src/DEVELOPMENT.md; fi
          cp -R packaging release-src/packaging
          (cd release-src && zip -r ../telegram-moderator-bot-source-bundle.zip .)

      - name: Upload source bundle to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: telegram-moderator-bot-source-bundle.zip

  binary_matrix:
    name: Build Binary (${{ matrix.name }})
    needs:
      - verify
      - release_init
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            name: windows
            archive: telegram-moderator-bot-windows-x64.zip
          - runner: ubuntu-latest
            name: linux
            archive: telegram-moderator-bot-linux-x64.tar.gz
          - runner: macos-latest
            name: macos
            archive: telegram-moderator-bot-macos-universal.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-admin/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web-admin

      - name: Build frontend
        run: npm run build
        working-directory: web-admin

      - name: Install dependencies for binary build
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build binary with PyInstaller
        run: pyinstaller packaging/pyinstaller.spec --noconfirm

      - name: Pack Windows artifact
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-bin | Out-Null
          Copy-Item dist/telegram-moderator-bot/* release-bin/ -Recurse
          New-Item -ItemType Directory -Force -Path release-bin/web-admin | Out-Null
          Copy-Item web-admin/dist release-bin/web-admin/dist -Recurse
          Copy-Item README.md release-bin/
          Copy-Item .env.example release-bin/
          Copy-Item -Recurse docs release-bin/docs
          Compress-Archive -Path release-bin\* -DestinationPath "${{ matrix.archive }}" -Force

      - name: Pack Linux artifact
        if: matrix.name == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release-bin
          mkdir -p release-bin/web-admin
          cp -R dist/telegram-moderator-bot/. release-bin/
          cp -R web-admin/dist release-bin/web-admin/dist
          cp README.md release-bin/
          cp .env.example release-bin/
          cp -R docs release-bin/docs
          tar -czf "${{ matrix.archive }}" -C release-bin .

      - name: Pack macOS artifact
        if: matrix.name == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release-bin
          mkdir -p release-bin/web-admin
          cp -R dist/telegram-moderator-bot/. release-bin/
          cp -R web-admin/dist release-bin/web-admin/dist
          cp README.md release-bin/
          cp .env.example release-bin/
          cp -R docs release-bin/docs
          tar -czf "${{ matrix.archive }}" -C release-bin .

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.archive }}

  docker_publish:
    name: Publish Docker Image
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name to lowercase
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest
