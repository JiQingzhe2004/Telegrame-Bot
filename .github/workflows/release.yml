name: Release On Tag

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-admin/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run backend tests
        run: pytest

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web-admin

      - name: Type check frontend
        run: npx tsc -b
        working-directory: web-admin

      - name: Build frontend
        run: npm run build
        working-directory: web-admin

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web-admin/dist
          if-no-files-found: error

  bundle:
    name: Build Source Bundle
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web-admin/dist

      - name: Build source deploy bundle
        run: |
          set -euo pipefail
          rm -rf release-src
          mkdir -p release-src
          cp -R src release-src/src
          cp -R web-admin/dist release-src/web-admin/dist
          cp -R docs release-src/docs
          cp README.md release-src/README.md
          cp .env.example release-src/.env.example
          cp pyproject.toml release-src/pyproject.toml
          cp DEVELOPMENT.md release-src/DEVELOPMENT.md
          cp -R packaging release-src/packaging
          (cd release-src && zip -r ../telegram-moderator-bot-source-bundle.zip .)

      - name: Upload source bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-source-bundle
          path: telegram-moderator-bot-source-bundle.zip
          if-no-files-found: error

  binary_matrix:
    name: Build Binary (${{ matrix.name }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            name: windows
            archive: telegram-moderator-bot-windows-x64.zip
          - runner: ubuntu-latest
            name: linux
            archive: telegram-moderator-bot-linux-x64.tar.gz
          - runner: macos-latest
            name: macos
            archive: telegram-moderator-bot-macos-universal.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web-admin/dist

      - name: Install dependencies for binary build
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Build binary with PyInstaller
        run: pyinstaller packaging/pyinstaller.spec --noconfirm

      - name: Pack Windows artifact
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-bin | Out-Null
          Copy-Item dist/telegram-moderator-bot/telegram-moderator-bot.exe release-bin/
          New-Item -ItemType Directory -Force -Path release-bin/web-admin | Out-Null
          Copy-Item web-admin/dist release-bin/web-admin/dist -Recurse
          Copy-Item README.md release-bin/
          Copy-Item .env.example release-bin/
          Copy-Item -Recurse docs release-bin/docs
          Compress-Archive -Path release-bin\* -DestinationPath "${{ matrix.archive }}" -Force

      - name: Pack Linux artifact
        if: matrix.name == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release-bin
          mkdir -p release-bin/web-admin
          cp dist/telegram-moderator-bot/telegram-moderator-bot release-bin/
          cp -R web-admin/dist release-bin/web-admin/dist
          cp README.md release-bin/
          cp .env.example release-bin/
          cp -R docs release-bin/docs
          tar -czf "${{ matrix.archive }}" -C release-bin .

      - name: Pack macOS artifact
        if: matrix.name == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release-bin
          mkdir -p release-bin/web-admin
          cp dist/telegram-moderator-bot/telegram-moderator-bot release-bin/
          cp -R web-admin/dist release-bin/web-admin/dist
          cp README.md release-bin/
          cp .env.example release-bin/
          cp -R docs release-bin/docs
          tar -czf "${{ matrix.archive }}" -C release-bin .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-binary-${{ matrix.name }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  docker_publish:
    name: Publish Docker Image
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  release:
    name: Create GitHub Release
    needs:
      - bundle
      - binary_matrix
      - docker_publish
    runs-on: ubuntu-latest
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-artifacts/telegram-moderator-bot-source-bundle.zip
            release-artifacts/telegram-moderator-bot-windows-x64.zip
            release-artifacts/telegram-moderator-bot-linux-x64.tar.gz
            release-artifacts/telegram-moderator-bot-macos-universal.tar.gz
