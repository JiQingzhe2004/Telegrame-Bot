services:
  redis:
    image: redis:7-alpine
    container_name: telegram-moderator-bot-redis
    restart: unless-stopped

  telegram-moderator-bot:
    image: ghcr.io/jiqingzhe2004/telegrame-bot:${IMAGE_TAG:-latest}
    container_name: telegram-moderator-bot
    restart: unless-stopped
    ports:
      # 默认只暴露 80，减少公网部署与 Cloudflare 回源端口配置成本
      - "80:80"
    environment:
      LOG_LEVEL: INFO
      DB_PATH: /app/data/bot.db
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_NAMESPACE: ${REDIS_NAMESPACE:-tmbot}
      HTTP_API_HOST: 0.0.0.0
      HTTP_API_PORT: 80
      WEBHOOK_HOST: 0.0.0.0
      WEBHOOK_PORT: 80
      WEB_ADMIN_DIST_PATH: /app/web-admin/dist
    depends_on:
      - redis
    volumes:
      - telegram_moderator_bot_data:/app/data

volumes:
  telegram_moderator_bot_data:
    name: telegram-moderator-bot-data
